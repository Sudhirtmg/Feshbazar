name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd Backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
        run: |
          cd Backend
          python manage.py test apps.accounts.tests apps.orders.tests apps.shops.tests apps.cart.tests apps.products.tests --verbosity=1

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FrontEnd/freshbazaar/package-lock.json

      - name: Install and build
        run: |
          cd FrontEnd/freshbazaar
          npm install
          npm run build
