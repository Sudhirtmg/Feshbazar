services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freshbazaar_db
      POSTGRES_USER: freshbazaar_user
      POSTGRES_PASSWORD: freshbazaar_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshbazaar_user -d freshbazaar_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-docker-dev-secret-change-in-production}
      DEBUG: "False"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: freshbazaar_db
      DB_USER: freshbazaar_user
      DB_PASSWORD: freshbazaar_pass
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./FrontEnd/freshbazaar
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_media:
  backend_static:
